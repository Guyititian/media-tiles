<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browse Media Tiles</title>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  margin:20px;
}

h1 { margin-bottom:10px; }

input {
  width:100%;
  padding:10px;
  margin:10px 0 15px;
  border-radius:6px;
  border:none;
}

/* Tabs */
.tabs {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
  position:sticky;
  top:0;
  background:#111;
  padding:10px 0;
  z-index:10;
}

.tab {
  padding:8px 12px;
  background:#222;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  opacity:0.8;
  user-select:none;
}

.tab.active {
  background:white;
  color:black;
  opacity:1;
}

/* Sections */
section {
  margin-bottom:30px;
}

h2 {
  margin:20px 0 10px;
  text-transform:capitalize;
  font-size:18px;
  opacity:0.9;
}

/* Grid */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
}

.tile {
  background:#222;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.tile img {
  width:100%;
  border-radius:8px;
  cursor:pointer;
}

button {
  margin-top:6px;
  width:100%;
  padding:6px;
  cursor:pointer;
}

/* App container */
#app {
  margin-top:10px;
}
</style>
</head>

<body>

<h1>Browse Media Tiles</h1>

<div class="tabs" id="tabs"></div>

<input id="search" placeholder="Search tiles..." />

<div id="app">Loading...</div>

<script src="assets.js"></script>

<script>
let allItems = [];
let currentCategory = "all";

/* COPY FUNCTION */
function copy(text) {
  navigator.clipboard.writeText(text);
}

/* URL STATE */
const params = new URLSearchParams(window.location.search);
currentCategory = params.get("category") || "all";

/* BUILD TABS */
function buildTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  const tabList = ["all", ...categories];

  tabList.forEach(cat => {
    const div = document.createElement("div");
    div.className = "tab";

    if (cat === currentCategory) div.classList.add("active");

    div.textContent = cat.replace(/-/g, " ");

    div.onclick = () => {
      currentCategory = cat;

      const newUrl = cat === "all"
        ? "browse.html"
        : `browse.html?category=${cat}`;

      history.pushState({}, "", newUrl);

      loadData();
      updateTabs();
    };

    tabs.appendChild(div);
  });
}

/* KEEP TAB STATE SYNCED */
function updateTabs() {
  document.querySelectorAll(".tab").forEach(tab => {
    const label = tab.textContent.toLowerCase().replace(/ /g, "-");

    if (
      (currentCategory === "all" && tab.textContent.toLowerCase() === "all") ||
      label === currentCategory
    ) {
      tab.classList.add("active");
    } else {
      tab.classList.remove("active");
    }
  });
}

/* LOAD DATA (GROUPED VIEW) */
async function loadData() {
  const app = document.getElementById("app");
  app.innerHTML = "Loading...";

  const container = document.createElement("div");
  allItems = [];

  const list = currentCategory === "all"
    ? categories
    : [currentCategory];

  for (const cat of list) {
    try {
      const items = await fetchCategory(cat);
      allItems = allItems.concat(items);

      // SECTION
      const section = document.createElement("section");

      const title = document.createElement("h2");
      title.textContent = cat.replace(/-/g, " ");

      const grid = document.createElement("div");
      grid.className = "grid";

      items.forEach(item => {
        const tile = document.createElement("div");
        tile.className = "tile";

        tile.innerHTML = `
          <img src="${item.url}" onclick="copy('${item.url}')"/>
          <div>${item.name}</div>
          <button onclick="copy('${item.url}')">Copy Link</button>
        `;

        grid.appendChild(tile);
      });

      section.appendChild(title);
      section.appendChild(grid);
      container.appendChild(section);

    } catch (e) {
      console.error("Error loading category:", cat, e);
    }
  }

  app.innerHTML = "";
  app.appendChild(container);
}

/* SEARCH (FLATTENS RESULTS) */
document.getElementById("search").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();

  const filtered = allItems.filter(i =>
    i.name.toLowerCase().includes(q)
  );

  const app = document.getElementById("app");
  app.innerHTML = "";

  const grid = document.createElement("div");
  grid.className = "grid";

  filtered.forEach(item => {
    const tile = document.createElement("div");
    tile.className = "tile";

    tile.innerHTML = `
      <img src="${item.url}" onclick="copy('${item.url}')"/>
      <div>${item.name}</div>
      <button onclick="copy('${item.url}')">Copy Link</button>
    `;

    grid.appendChild(tile);
  });

  app.appendChild(grid);
});

/* BACK BUTTON SUPPORT */
window.addEventListener("popstate", () => {
  const params = new URLSearchParams(window.location.search);
  currentCategory = params.get("category") || "all";

  loadData();
  updateTabs();
});

/* INIT */
buildTabs();
loadData();

</script>

</body>
</html>
