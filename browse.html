<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Tiles Library</title>

<style>
:root {
  --bg: #0b0f14;
  --panel: #121823;
  --panel-2: #0f141d;
  --text: #e8eef7;
  --muted: rgba(232, 238, 247, 0.6);
  --accent: #7aa2ff;
  --border: rgba(255,255,255,0.06);
  --shadow: 0 20px 60px rgba(0,0,0,0.55);
}

body {
  margin:0;
  background: radial-gradient(1200px 800px at 50% 10%, #141b2a 0%, var(--bg) 60%);
  color: var(--text);
  font-family: system-ui, -apple-system, Segoe UI, Arial;
}

/* PAGE */
.page {
  padding: 28px;
}

/* HEADER */
.header {
  max-width:1100px;
  margin: 0 auto 18px auto;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 22px;
  box-shadow: var(--shadow);
}

/* TOP ROW */
.brand-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom: 10px;
}

/* BRAND (NOW MORE LIKE A BUTTON) */
.brand {
  font-size:20px;
  font-weight:800;
  cursor:pointer;
  letter-spacing:0.3px;
}

.brand span {
  color: var(--accent);
}

/* NAV SWITCH (LIBRARY / TOOLS) */
.ecosystem-nav {
  display:flex;
  gap:10px;
  align-items:center;
}

.nav-btn {
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
  border:1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--muted);
  cursor:pointer;
  transition:0.2s;
}

.nav-btn:hover {
  transform: translateY(-2px);
  color: var(--text);
}

.nav-btn.active {
  background: rgba(122,162,255,0.15);
  border-color: rgba(122,162,255,0.35);
  color: var(--text);
  box-shadow: 0 10px 30px rgba(122,162,255,0.08);
}

/* SEARCH */
input {
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--text);
  outline:none;
  margin-top:10px;
}

/* TABS */
.tabs {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}

.tab {
  padding:8px 12px;
  border-radius:10px;
  font-size:13px;
  cursor:pointer;
  background: rgba(255,255,255,0.03);
  border:1px solid var(--border);
  color: var(--muted);
  transition: 0.2s;
}

.tab:hover {
  transform: translateY(-2px);
}

.tab.active {
  background: rgba(122,162,255,0.15);
  border-color: rgba(122,162,255,0.35);
  color: var(--text);
}

/* CONTENT */
#app {
  max-width:1100px;
  margin: 0 auto;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap:14px;
}

/* TILE (WINDOW STYLE FIXED DEPTH) */
.tile {
  background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  transition: all 0.25s ease;
}

.tile:hover {
  transform: translateY(-6px);
  border-color: rgba(122,162,255,0.25);
  box-shadow: 0 18px 55px rgba(0,0,0,0.55);
}

/* IMAGE */
.tile img {
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  cursor:pointer;
}

/* TEXT */
.tile-title {
  padding:10px 10px 0 10px;
  font-size:13px;
}

/* BUTTON */
.tile button {
  margin:10px;
  padding:8px;
  border-radius:10px;
  border:1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--text);
  cursor:pointer;
}

/* TOAST */
#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  color:#000;
  padding:10px 14px;
  border-radius:10px;
  opacity:0;
  transition:0.2s;
  pointer-events:none;
}

</style>
</head>

<body>

<div class="page">

  <div class="header">

    <div class="brand-row">

      <div class="brand" id="brand"><span>Media</span> Tiles</div>

      <div class="ecosystem-nav">
        <div class="nav-btn active">Library</div>
        <div class="nav-btn" onclick="window.location.href='https://guyititian.github.io/media-lab/'">
          Tools
        </div>
      </div>

    </div>

    <input id="search" placeholder="Search library..." />

    <div class="tabs" id="tabs"></div>

  </div>

  <div id="app">Loading...</div>

</div>

<div id="toast">Copied</div>

<script src="assets.js"></script>

<script>

let allItems = [];
let currentCategory = "all";

const params = new URLSearchParams(window.location.search);
currentCategory = params.get("category") || "all";

/* COPY */
function copy(text) {
  navigator.clipboard.writeText(text);
  const t = document.getElementById("toast");
  t.style.opacity = 1;
  setTimeout(()=>t.style.opacity=0, 900);
}

/* BRAND HOME */
document.getElementById("brand").onclick = () => {
  window.location.href = "index.html";
};

/* HEADER */
function updateHeader() {
  const el = document.getElementById("app");
}

/* TABS */
function buildTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  const list = ["all", ...categories];

  list.forEach(cat => {
    const d = document.createElement("div");
    d.className = "tab";

    if (cat === currentCategory) d.classList.add("active");

    d.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);

    d.onclick = () => {
      currentCategory = cat;

      const url = cat === "all"
        ? "browse.html"
        : `browse.html?category=${cat}`;

      history.pushState({}, "", url);

      load();
      buildTabs();
    };

    tabs.appendChild(d);
  });
}

/* FAST PARALLEL LOAD */
async function load() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  const list = currentCategory === "all"
    ? categories
    : [currentCategory];

  const results = await Promise.all(
    list.map(cat => fetchCategory(cat))
  );

  results.forEach((items, i) => {
    const cat = list[i];

    const section = document.createElement("section");

    const title = document.createElement("h2");
    title.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);

    const grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(i => {
      const tile = document.createElement("div");
      tile.className = "tile";

      tile.innerHTML = `
        <img src="${i.url}" onclick="copy('${i.url}')"/>
        <div class="tile-title">${i.name}</div>
        <button onclick="copy('${i.url}')">Copy Link</button>
      `;

      grid.appendChild(tile);
    });

    section.appendChild(title);
    section.appendChild(grid);
    app.appendChild(section);
  });
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();

  const app = document.getElementById("app");
  app.innerHTML = "";

  const filtered = allItems.filter(i =>
    i.name.toLowerCase().includes(q)
  );

  const grid = document.createElement("div");
  grid.className = "grid";

  filtered.forEach(i => {
    const tile = document.createElement("div");
    tile.className = "tile";

    tile.innerHTML = `
      <img src="${i.url}" onclick="copy('${i.url}')"/>
      <div class="tile-title">${i.name}</div>
      <button onclick="copy('${i.url}')">Copy Link</button>
    `;

    grid.appendChild(tile);
  });

  app.appendChild(grid);
});

buildTabs();
load();

</script>

</body>
</html>
