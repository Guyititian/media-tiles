<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browse Media Tiles</title>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  margin:20px;
}

h1 { margin-bottom:10px; }

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  border:none;
}

/* Tabs */
.tabs {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.tab {
  padding:8px 12px;
  background:#222;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  opacity:0.8;
}

.tab.active {
  background:white;
  color:black;
  opacity:1;
}

/* Grid */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
}

.tile {
  background:#222;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.tile img {
  width:100%;
  border-radius:8px;
  cursor:pointer;
}

button {
  margin-top:6px;
  width:100%;
  padding:6px;
}

/* Loader */
#loader {
  text-align:center;
  margin-top:40px;
}
</style>
</head>

<body>

<h1>Browse Media Tiles</h1>

<input id="search" placeholder="Search tiles..." />

<div class="tabs" id="tabs"></div>

<div id="app"></div>

<script src="assets.js"></script>

<script>
let allItems = [];
let currentCategory = "all";

function copy(text) {
  navigator.clipboard.writeText(text);
}

/* GET CATEGORY FROM URL */
const params = new URLSearchParams(window.location.search);
const initialCategory = params.get("category") || "all";

/* BUILD TABS */
function buildTabs() {
  const tabs = document.getElementById("tabs");

  const allTab = ["all", "All"];
  const tabList = [allTab, ...categories.map(c => [c, c])];

  tabList.forEach(([key, label]) => {
    const div = document.createElement("div");
    div.className = "tab";
    div.textContent = label.replace(/-/g," ");

    if (key === initialCategory) div.classList.add("active");

    div.onclick = () => {
      window.location.href = key === "all"
        ? "browse.html"
        : `browse.html?category=${key}`;
    };

    tabs.appendChild(div);
  });
}

/* RENDER */
function render(items) {
  const app = document.getElementById("app");
  app.innerHTML = "";

  const grid = document.createElement("div");
  grid.className = "grid";

  items.forEach(item => {
    const tile = document.createElement("div");
    tile.className = "tile";

    tile.innerHTML = `
      <img src="${item.url}" onclick="copy('${item.url}')"/>
      <div>${item.name}</div>
      <button onclick="copy('${item.url}')">Copy</button>
    `;

    grid.appendChild(tile);
  });

  app.appendChild(grid);
}

/* LOAD DATA */
async function load() {
  document.getElementById("app").innerHTML = "<div id='loader'>Loading...</div>";

  allItems = [];

  const list = initialCategory === "all"
    ? categories
    : [initialCategory];

  for (const cat of list) {
    const items = await fetchCategory(cat);
    allItems = allItems.concat(items);
  }

  render(allItems);
}

/* SEARCH */
document.getElementById("search").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();

  const filtered = allItems.filter(i =>
    i.name.toLowerCase().includes(q)
  );

  render(filtered);
});

buildTabs();
load();
</script>

</body>
</html>
