<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browse Media Tiles</title>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  background: radial-gradient(circle at top, #1a1a1a, #0b0b0b 70%);
}

/* =========================
   HEADER (LIBRARY IDENTITY)
========================= */
.header {
  position: sticky;
  top: 0;
  padding:20px;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* BRAND (MORE LOGO-LIKE) */
#brand {
  font-size:38px;
  margin:0;
  cursor:pointer;

  color:white;
  letter-spacing:2px;

  text-shadow:
    0 0 10px rgba(255,255,255,0.2),
    0 0 30px rgba(255,255,255,0.12);
}

/* CONTEXT LABEL */
#contextTitle {
  margin-top:6px;
  font-size:14px;
  opacity:0.65;
}

/* =========================
   TABS (DEPTH SYSTEM)
========================= */
.tabs {
  margin-top:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;

  padding:10px;
  border-radius:14px;

  background: rgba(20,20,20,0.6);
  border: 1px solid rgba(255,255,255,0.05);

  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.03),
    0 10px 25px rgba(0,0,0,0.35);
}

.tab {
  padding:9px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;

  background:#1a1a1a;
  transition: all 0.2s ease;
}

/* HOVER LIFT */
.tab:hover {
  transform: translateY(-2px);
  background:#222;
}

/* ACTIVE TAB (FOCUS GLOW) */
.tab.active {
  background:#2a2a2a;

  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.18),
    0 0 18px rgba(255,255,255,0.18);
}

/* =========================
   SEARCH (RESTORED FOCUS CORE)
========================= */
.searchWrap {
  margin:20px;
  padding:12px;
  border-radius:14px;

  background: rgba(20,20,20,0.85);
  border:1px solid rgba(255,255,255,0.06);

  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.03),
    0 12px 30px rgba(0,0,0,0.45);

  backdrop-filter: blur(10px);
}

input {
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
  background:transparent;
  color:white;
  font-size:14px;
  outline:none;
}

/* FOCUS GLOW */
input:focus {
  box-shadow: 0 0 0 2px rgba(255,255,255,0.2);
}

/* =========================
   SECTIONS
========================= */
section {
  margin:30px 20px;
}

h2 {
  margin-bottom:12px;
  font-size:18px;
  opacity:0.9;
}

/* =========================
   GRID
========================= */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:16px;
}

/* =========================
   TILE (DEPTH SYSTEM)
========================= */
.tile {
  background:#151515;
  padding:10px;
  border-radius:14px;
  display:flex;
  flex-direction:column;

  border:1px solid rgba(255,255,255,0.05);

  transition: all 0.25s ease;
}

/* LIFT + LIGHT */
.tile:hover {
  transform: translateY(-6px) scale(1.02);

  box-shadow:
    0 18px 35px rgba(0,0,0,0.6),
    0 0 18px rgba(255,255,255,0.15);

  border-color: rgba(255,255,255,0.18);
}

/* IMAGE */
.tile img {
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
}

/* TITLE */
.tile-title {
  margin-top:8px;
  font-size:14px;
  opacity:0.9;
}

/* BUTTON */
.tile button {
  margin-top:auto;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#ffffff;
  color:black;
  cursor:pointer;
  font-size:13px;
}

/* =========================
   TOAST
========================= */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: white;
  color: black;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  opacity: 0;
  transition: all 0.25s ease;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1 id="brand">MEDIA TILES</h1>
  <div id="contextTitle">LIBRARY</div>
  <div class="tabs" id="tabs"></div>
</div>

<!-- SEARCH (RESTORED FOCUS CORE) -->
<div class="searchWrap">
  <input id="search" placeholder="Search tiles..." />
</div>

<!-- APP -->
<div id="app">Loading...</div>

<!-- TOAST -->
<div id="toast">Copied</div>

<script src="assets.js"></script>

<script>
let allItems = [];
let currentCategory = "all";

/* STATE */
const params = new URLSearchParams(window.location.search);
currentCategory = params.get("category") || "all";

/* COPY */
function copy(text) {
  navigator.clipboard.writeText(text);
  showToast("Copied ✓");
}

/* TOAST */
function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;

  toast.style.opacity = "1";
  toast.style.transform = "translateX(-50%) translateY(0px)";

  setTimeout(() => {
    toast.style.opacity = "0";
    toast.style.transform = "translateX(-50%) translateY(10px)";
  }, 1100);
}

/* BRAND NAV */
document.getElementById("brand").onclick = () => {
  window.location.href = "index.html";
};

/* HEADER */
function updateHeader() {
  const context = document.getElementById("contextTitle");

  context.textContent =
    currentCategory === "all"
      ? "LIBRARY • ALL COLLECTIONS"
      : "LIBRARY • " + currentCategory.replace(/-/g, " ");
}

/* TABS */
function buildTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  const tabList = ["all", ...categories];

  tabList.forEach(cat => {
    const div = document.createElement("div");
    div.className = "tab";

    if (cat === currentCategory) div.classList.add("active");

    div.textContent = cat.replace(/-/g, " ");

    div.onclick = () => {
      currentCategory = cat;

      const url = cat === "all"
        ? "browse.html"
        : `browse.html?category=${cat}`;

      history.pushState({}, "", url);

      updateHeader();
      loadData();
      updateTabs();
    };

    tabs.appendChild(div);
  });
}

/* ACTIVE TAB STATE */
function updateTabs() {
  document.querySelectorAll(".tab").forEach(tab => {
    const label = tab.textContent.toLowerCase().replace(/ /g, "-");

    if (
      (currentCategory === "all" && tab.textContent.toLowerCase() === "all") ||
      label === currentCategory
    ) {
      tab.classList.add("active");
    } else {
      tab.classList.remove("active");
    }
  });
}

/* LOAD */
async function loadData() {
  const app = document.getElementById("app");
  app.innerHTML = "Loading...";

  const container = document.createElement("div");
  allItems = [];

  const list = currentCategory === "all"
    ? categories
    : [currentCategory];

  for (const cat of list) {
    const items = await fetchCategory(cat);
    allItems = allItems.concat(items);

    const section = document.createElement("section");

    const title = document.createElement("h2");
    title.textContent = `${cat.replace(/-/g, " ")} (${items.length})`;

    const grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(item => {
      const tile = document.createElement("div");
      tile.className = "tile";

      tile.innerHTML = `
        <img src="${item.url}" onclick="copy('${item.url}')"/>
        <div class="tile-title">${item.name}</div>
        <button onclick="copy('${item.url}')">Copy Link</button>
      `;

      grid.appendChild(tile);
    });

    section.appendChild(title);
    section.appendChild(grid);
    container.appendChild(section);
  }

  app.innerHTML = "";
  app.appendChild(container);
}

/* SEARCH */
document.getElementById("search").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();

  const filtered = allItems.filter(i =>
    i.name.toLowerCase().includes(q)
  );

  const app = document.getElementById("app");
  app.innerHTML = "";

  const grid = document.createElement("div");
  grid.className = "grid";

  filtered.forEach(item => {
    const tile = document.createElement("div");
    tile.className = "tile";

    tile.innerHTML = `
      <img src="${item.url}" onclick="copy('${item.url}')"/>
      <div class="tile-title">${item.name}</div>
      <button onclick="copy('${item.url}')">Copy Link</button>
    `;

    grid.appendChild(tile);
  });

  app.appendChild(grid);
});

/* BACK */
window.addEventListener("popstate", () => {
  const params = new URLSearchParams(window.location.search);
  currentCategory = params.get("category") || "all";

  updateHeader();
  loadData();
  updateTabs();
});

/* INIT */
updateHeader();
buildTabs();
loadData();
</script>

</body>
</html>
