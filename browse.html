<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Tiles Library</title>

<style>
:root {
  --bg: #0b0f14;
  --panel: #121823;
  --panel-2: #0f141d;
  --text: #e8eef7;
  --muted: rgba(232, 238, 247, 0.6);
  --accent: #7aa2ff;
  --border: rgba(255,255,255,0.06);
  --shadow: 0 20px 60px rgba(0,0,0,0.55);
}

body {
  margin:0;
  background: radial-gradient(1200px 800px at 50% 10%, #141b2a 0%, var(--bg) 60%);
  color: var(--text);
  font-family: system-ui, -apple-system, Segoe UI, Arial;
}

.page {
  padding: 28px;
}

/* HEADER CARD */
.header {
  max-width:1100px;
  margin: 0 auto 18px auto;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 22px;
  box-shadow: var(--shadow);
}

/* BRAND */
.brand-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom: 10px;
}

.brand {
  font-size:20px;
  font-weight:800;
  cursor:pointer;
  letter-spacing:0.3px;
}

.brand span {
  color: var(--accent);
}

.context {
  font-size:12px;
  color: var(--muted);
}

/* SEARCH FIXED CONTAINMENT */
.search-wrap {
  width:100%;
  display:block;
}

input {
  width:100%;
  box-sizing:border-box; /* 🔥 fixes overflow issue */
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--text);
  outline:none;
  margin-top:10px;
}

/* TABS */
.tabs {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}

.tab {
  padding:8px 12px;
  border-radius:10px;
  font-size:13px;
  cursor:pointer;
  background: rgba(255,255,255,0.03);
  border:1px solid var(--border);
  color: var(--muted);
  transition: 0.2s;
  text-transform: capitalize;
}

.tab:hover {
  transform: translateY(-2px);
}

.tab.active {
  background: rgba(122,162,255,0.15);
  border-color: rgba(122,162,255,0.35);
  color: var(--text);
  box-shadow: 0 10px 30px rgba(122,162,255,0.08);
}

/* CONTENT */
#app {
  max-width:1100px;
  margin: 0 auto;
}

section {
  margin-top: 26px;
}

h2 {
  font-size:14px;
  font-weight:600;
  margin: 18px 0 12px;
  color: var(--muted);
  text-transform: capitalize;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap:14px;
}

/* TILE */
.tile {
  background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  transition: all 0.25s ease;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

.tile:hover {
  transform: translateY(-6px);
  border-color: rgba(122,162,255,0.25);
  box-shadow: 0 18px 55px rgba(0,0,0,0.55);
}

.tile img {
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  cursor:pointer;
}

.tile-title {
  padding:10px;
  font-size:13px;
}

.tile button {
  margin:10px;
  padding:8px;
  border-radius:10px;
  border:1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--text);
  cursor:pointer;
}

/* TOAST */
#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  color:#000;
  padding:10px 14px;
  border-radius:10px;
  opacity:0;
  transition:0.2s;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="page">

  <div class="header">

    <div class="brand-row">
      <div class="brand" id="brand"><span>Media</span> Tiles</div>
      <div class="context" id="contextTitle"></div>
    </div>

    <div class="search-wrap">
      <input id="search" placeholder="Search library..." />
    </div>

    <div class="tabs" id="tabs"></div>

  </div>

  <div id="app">Loading...</div>

</div>

<div id="toast">Copied</div>

<script src="assets.js"></script>

<script>
let allItems = [];
let currentCategory = "all";

/* IMPORTANT:
   This keeps GitHub folder names intact
   but allows nice UI labels */
function label(cat) {
  return cat.charAt(0).toUpperCase() + cat.slice(1);
}

const params = new URLSearchParams(window.location.search);
currentCategory = params.get("category") || "all";

/* COPY */
function copy(text) {
  navigator.clipboard.writeText(text);
  const t = document.getElementById("toast");
  t.style.opacity = 1;
  setTimeout(()=>t.style.opacity=0, 900);
}

/* BRAND NAV */
document.getElementById("brand").onclick = () => {
  window.location.href = "index.html";
};

/* HEADER */
function updateHeader() {
  const el = document.getElementById("contextTitle");
  el.textContent = currentCategory === "all"
    ? "Library"
    : label(currentCategory) + " / Library";
}

/* TABS */
function buildTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  const list = ["all", ...categories];

  list.forEach(cat => {
    const d = document.createElement("div");
    d.className = "tab";

    if (cat === currentCategory) d.classList.add("active");

    d.textContent = cat === "all" ? "All" : label(cat);

    d.onclick = () => {
      currentCategory = cat;

      const url = cat === "all"
        ? "browse.html"
        : `browse.html?category=${cat}`;

      history.pushState({}, "", url);

      updateHeader();
      load();
      buildTabs();
    };

    tabs.appendChild(d);
  });
}

/* LOAD */
async function load() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  allItems = [];

  const list = currentCategory === "all"
    ? categories
    : [currentCategory];

  for (const cat of list) {
    const items = await fetchCategory(cat);
    allItems.push(...items);

    const section = document.createElement("section");

    const title = document.createElement("h2");
    title.textContent = label(cat);

    const grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(i => {
      const tile = document.createElement("div");
      tile.className = "tile";

      tile.innerHTML = `
        <img src="${i.url}" onclick="copy('${i.url}')"/>
        <div class="tile-title">${i.name}</div>
        <button onclick="copy('${i.url}')">Copy</button>
      `;

      grid.appendChild(tile);
    });

    section.appendChild(title);
    section.appendChild(grid);
    app.appendChild(section);
  }
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  const app = document.getElementById("app");
  app.innerHTML = "";

  const filtered = allItems.filter(i =>
    i.name.toLowerCase().includes(q)
  );

  const grid = document.createElement("div");
  grid.className = "grid";

  filtered.forEach(i => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.innerHTML = `
      <img src="${i.url}" onclick="copy('${i.url}')"/>
      <div class="tile-title">${i.name}</div>
      <button onclick="copy('${i.url}')">Copy</button>
    `;
    grid.appendChild(tile);
  });

  app.appendChild(grid);
});

updateHeader();
buildTabs();
load();
</script>

</body>
</html>
