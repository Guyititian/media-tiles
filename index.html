<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media Tiles Ecosystem</title>

<style>
body {
  margin:0;
  background:#070707;
  color:white;
  font-family:Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* OUTER LAYER */
.container {
  text-align:center;
  max-width:1000px;
}

/* 🔥 HERO BRAND (THIS IS THE FOCAL POINT AGAIN) */
.hero {
  padding:30px 50px;
  border-radius:24px;

  background: radial-gradient(circle at top,
    rgba(255,255,255,0.08),
    rgba(255,255,255,0.02),
    transparent 70%
  );

  box-shadow:
    0 30px 80px rgba(0,0,0,0.7),
    0 0 60px rgba(255,255,255,0.08);

  display:inline-block;
}

/* BIG BRAND TEXT */
.hero h1 {
  margin:0;
  font-size:64px;

  letter-spacing:2px;

  background: linear-gradient(90deg, #ffffff, #bfbfbf);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow:
    0 0 40px rgba(255,255,255,0.25),
    0 0 80px rgba(255,255,255,0.10);
}

/* SUBTITLE BELOW HERO */
.hero p {
  margin-top:10px;
  font-size:14px;
  opacity:0.65;
}

/* TILE ROW */
.cards {
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:60px;
}

/* STRONGER TILE DEPTH */
.card {
  width:340px;
  padding:26px;
  border-radius:18px;

  background: rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);

  box-shadow:
    0 20px 50px rgba(0,0,0,0.6);

  cursor:pointer;

  transition:0.25s ease;
}

/* CLEAR LIFT */
.card:hover {
  transform: translateY(-12px);
  box-shadow:
    0 35px 90px rgba(0,0,0,0.8),
    0 0 30px rgba(255,255,255,0.10);
}

/* CARD TEXT */
.card h2 {
  font-size:20px;
  margin:0 0 8px;
}

.card p {
  font-size:13px;
  opacity:0.7;
  line-height:1.4;
}

/* FOOTER (PUSHED DOWN, NOT LOST) */
.footer {
  margin-top:60px;
  font-size:12px;
  opacity:0.35;
}
</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <h1>Media Tiles</h1>
    <p>Ecosystem Portal — Browse • Transform • Generate</p>
  </div>

  <div class="cards">

    <div class="card" onclick="window.location.href='./browse.html'">
      <h2>📚 Library</h2>
      <p>Curated media tiles with structured collections and copyable asset links.</p>
    </div>

    <div class="card" onclick="window.location.href='https://guyititian.github.io/media-lab/'">
      <h2>🛠 Tools</h2>
      <p>Upload media and process it through generation pipelines and presets.</p>
    </div>

  </div>

  <div class="footer">
    Connected media ecosystem for browsing and generation workflows
  </div>

</div>

</body>
</html>
