<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Media Tiles</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      margin-bottom: 30px;
    }

    .cta {
      display: inline-block;
      padding: 14px 28px;
      background: white;
      color: black;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 30px;
      text-align: left;
    }

    .card {
      background: #1c1c1c;
      padding: 18px;
      border-radius: 12px;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      background: #262626;
    }

    .card h3 {
      margin: 0 0 8px;
      text-transform: capitalize;
    }

    .card p {
      font-size: 13px;
      margin: 0;
      opacity: 0.6;
    }

    a.card-link {
      text-decoration: none;
      color: inherit;
    }

    .footer {
      margin-top: 60px;
      font-size: 12px;
      opacity: 0.4;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Media Tiles</h1>
  <p>A structured image library for franchises, genres, decades, and curated collections.</p>

  <a class="cta" href="browse.html">Enter Library</a>

  <div id="grid" class="grid"></div>

  <div class="footer">
    Media Tiles • Hosted on GitHub Pages
  </div>

</div>

<script src="assets.js"></script>

<script>
function prettyName(name) {
  return name.replace(/-/g, " ");
}

function renderCategories() {
  const grid = document.getElementById("grid");

  categories.forEach(cat => {
    const a = document.createElement("a");
    a.href = "browse.html";
    a.className = "card-link";

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${prettyName(cat)}</h3>
      <p>Browse items in ${prettyName(cat)}.</p>
    `;

    a.appendChild(card);
    grid.appendChild(a);
  });
}

renderCategories();
</script>

</body>
</html>
