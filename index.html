<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Media Tiles Ecosystem</title>

<style>
body {
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  text-align:center;
  max-width:800px;
}

h1 {
  margin-bottom:6px;
  font-size:28px;
}

.sub {
  opacity:0.6;
  margin-bottom:40px;
  font-size:14px;
}

.cards {
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

.card {
  background:#1c1c1c;
  padding:22px;
  border-radius:14px;
  width:260px;
  cursor:pointer;
  transition:0.2s;
  text-align:left;
}

.card:hover {
  transform:translateY(-5px);
  background:#242424;
}

.card h2 {
  margin:0 0 10px 0;
  font-size:18px;
}

.card p {
  font-size:13px;
  opacity:0.7;
  line-height:1.4;
}

.footer {
  margin-top:40px;
  font-size:12px;
  opacity:0.4;
}
</style>
</head>

<body>

<div class="container">

  <h1>Media Tiles</h1>
  <div class="sub">Ecosystem Portal</div>

  <div class="cards">

    <!-- FIXED: explicit file path -->
    <div class="card" onclick="location.href='./media-tiles/index.html'">
      <h2>📚 Library</h2>
      <p>Browse curated media tiles and copy direct asset links.</p>
    </div>

    <!-- Tools placeholder (unchanged for now) -->
    <div class="card" onclick="alert('Media-Lab integration coming next step')">
      <h2>🛠 Tools</h2>
      <p>Bring your own media, process it, and download outputs.</p>
    </div>

  </div>

  <div class="footer">
    Media-Tiles Ecosystem • Library + Tools
  </div>

</div>

</body>
</html>
